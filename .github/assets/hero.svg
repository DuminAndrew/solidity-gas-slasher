<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="Solidity Gas-Slasher">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.9">
      <stop offset="0" stop-color="#1a1207"/>
      <stop offset="0.55" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff6b35">
        <animate attributeName="stop-color" values="#ff6b35;#ffb347;#ff8c42;#ff6b35" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#ffb347">
        <animate attributeName="stop-color" values="#ffb347;#ff8c42;#ff6b35;#ffb347" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#ff8c42">
        <animate attributeName="stop-color" values="#ff8c42;#ff6b35;#ffb347;#ff8c42" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="coreGlow">
      <stop offset="0" stop-color="#ff8c42" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#ff6b35" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .matrix { font: 700 13px 'Fira Code', monospace; fill: #ff8c42; opacity: 0.55; }
      .title  { font: 800 58px 'Segoe UI', 'Fira Code', sans-serif; }
      .sub    { font: 500 17px 'Fira Code', monospace; fill: #c9d1d9; letter-spacing: 3px; }
      .tag    { font: 600 13px 'Fira Code', monospace; fill: #8b949e; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)" rx="16"/>

  <!-- faint grid -->
  <g opacity="0.07" stroke="#ff8c42" stroke-width="0.5">
    <path d="M0 56 H1200 M0 112 H1200 M0 168 H1200 M0 224 H1200"/>
    <path d="M150 0 V280 M300 0 V280 M450 0 V280 M600 0 V280 M750 0 V280 M900 0 V280 M1050 0 V280"/>
  </g>

  <!-- falling solidity tokens -->
  <g opacity="0.4">
    <text x="70" y="-20" class="matrix">
      ++<tspan x="70" dy="18">i</tspan><tspan x="70" dy="18">!=</tspan><tspan x="70" dy="18">0</tspan><tspan x="70" dy="18">{</tspan><tspan x="70" dy="18">}</tspan><tspan x="70" dy="18">⛽</tspan>
      <animate attributeName="y" from="-130" to="280" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="1110" y="-20" class="matrix">
      .length<tspan x="1110" dy="18">SLOAD</tspan><tspan x="1110" dy="18">revert</tspan><tspan x="1110" dy="18">const</tspan>
      <animate attributeName="y" from="-130" to="280" dur="9s" begin="1.5s" repeatCount="indefinite"/>
    </text>
    <text x="1050" y="-20" class="matrix">
      0x<tspan x="1050" dy="18">calldata</tspan><tspan x="1050" dy="18">uint256</tspan>
      <animate attributeName="y" from="-130" to="280" dur="11s" begin="3s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- glow behind the pump -->
  <circle cx="195" cy="140" r="110" fill="url(#coreGlow)">
    <animate attributeName="r" values="100;125;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.85;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- fuel pump glyph -->
  <g transform="translate(150, 78)" filter="url(#glow)">
    <!-- pump body -->
    <rect x="0" y="0" width="64" height="120" rx="8" fill="#161b22" stroke="url(#flame)" stroke-width="3"/>
    <!-- display window -->
    <rect x="10" y="12" width="44" height="30" rx="4" fill="#0d1117" stroke="#ff8c42" stroke-width="1.5"/>
    <text x="32" y="33" text-anchor="middle" font="700 16px 'Fira Code', monospace" fill="#ffb347" font-family="'Fira Code', monospace" font-size="16" font-weight="700">⛽</text>
    <!-- gauge lines -->
    <rect x="12" y="54" width="40" height="4" rx="2" fill="#ff6b35" opacity="0.8"/>
    <rect x="12" y="64" width="28" height="4" rx="2" fill="#ff8c42" opacity="0.6"/>
    <rect x="12" y="74" width="34" height="4" rx="2" fill="#ffb347" opacity="0.7"/>
    <!-- hose + nozzle -->
    <path d="M64 40 q34 0 34 30 v40" fill="none" stroke="url(#flame)" stroke-width="5" stroke-linecap="round"/>
    <rect x="86" y="106" width="24" height="14" rx="3" fill="#161b22" stroke="url(#flame)" stroke-width="2.5"/>
    <!-- slash blade through the pump -->
    <line x1="-14" y1="134" x2="120" y2="-8" stroke="#ff3b3b" stroke-width="4" stroke-linecap="round" filter="url(#bigglow)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- wordmark -->
  <text x="320" y="118" class="title" fill="url(#flame)" filter="url(#glow)">
    Solidity Gas-Slasher
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>

  <text x="322" y="158" class="sub">
    FIND  GAS  INEFFICIENCIES  IN  SMART  CONTRACTS
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
  </text>

  <text x="322" y="200" class="tag">
    AST · @solidity-parser · 6 rules · SARIF / JSON / MD · CI gate
  </text>

  <!-- accent dots -->
  <g transform="translate(322, 224)">
    <circle cx="0" r="3.5" fill="#ff6b35"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="26" r="3.5" fill="#ff8c42"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="52" r="3.5" fill="#ffb347"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- drifting gas particles -->
  <g>
    <circle r="2" fill="#ffb347" opacity="0.8">
      <animateMotion dur="9s" repeatCount="indefinite" path="M 215 90 Q 400 30 700 80 T 1150 60"/>
    </circle>
    <circle r="1.5" fill="#ff6b35" opacity="0.7">
      <animateMotion dur="11s" begin="2s" repeatCount="indefinite" path="M 215 120 Q 500 200 900 130 T 1150 180"/>
    </circle>
    <circle r="1.5" fill="#ff8c42" opacity="0.7">
      <animateMotion dur="13s" begin="4s" repeatCount="indefinite" path="M 215 150 Q 600 60 1000 200 T 1150 120"/>
    </circle>
  </g>
</svg>
